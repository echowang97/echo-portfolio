<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ECHO-OS · Echo Wang</title>
  <meta name="description" content="Echo Wang · Design Director, Chief of Staff, Creative Developer. A retro desktop portfolio." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=VT323&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/reset.css" />
  <link rel="stylesheet" href="styles/desktop.css" />
  <link rel="stylesheet" href="styles/window.css" />
  <link rel="stylesheet" href="styles/boot.css" />
  <link rel="stylesheet" href="styles/crt.css" />
</head>
<body>
  <!-- 开机自检 -->
  <div id="boot" class="boot">
    <pre id="boot-logo" class="boot-logo"></pre>
    <pre id="boot-log" class="boot-log"></pre>
    <button id="boot-skip" class="boot-skip">SKIP &gt;</button>
  </div>

  <!-- 桌面 -->
  <main id="desktop" class="desktop" hidden>
    <ul id="icons" class="icons"></ul>
    <div id="windows" class="windows"></div>

    <!-- 任务栏 -->
    <footer class="taskbar">
      <button id="start-btn" class="start-btn">
        <span class="start-flag"></span> start
      </button>
      <div id="taskbar-items" class="taskbar-items"></div>
      <div class="tray">
        <span id="clock" class="clock"></span>
      </div>
    </footer>

    <!-- Start 菜单 -->
    <div id="start-menu" class="start-menu" hidden>
      <div class="start-head">
        <span class="start-avatar">E</span>
        <span class="start-user">Echo Wang</span>
      </div>
      <ul id="start-list" class="start-list"></ul>
      <div class="start-foot">// built by echo · pixels since '22</div>
    </div>
  </main>

  <!-- 视频弹窗（内嵌 YouTube 播放） -->
  <div id="video-modal" class="vmodal" hidden>
    <div class="vmodal-box">
      <header class="title-bar vmodal-bar">
        <span class="label" id="vmodal-title"></span>
        <button id="vmodal-close" class="ctrl" aria-label="close">&times;</button>
      </header>
      <div class="vmodal-frame">
        <iframe id="vmodal-iframe" title="YouTube video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
      </div>
      <div class="vmodal-foot">
        <a id="vmodal-link" class="btn-xp" target="_blank" rel="noopener">在 YouTube 打开 ↗</a>
      </div>
    </div>
  </div>

  <!-- 图片放大遮罩 -->
  <div id="lightbox" class="lightbox" hidden>
    <img id="lightbox-img" alt="" />
    <button id="lightbox-close" class="lightbox-close" aria-label="close">&times;</button>
  </div>

  <!-- CRT 老屏幕实验层（删掉这个 div 和 head 里的 crt.css 即可回滚） -->
  <div id="crt-screen" aria-hidden="true"><span class="crt-roll"></span></div>
  <button id="crt-toggle" class="crt-toggle" type="button" aria-pressed="true" title="CRT 屏幕效果开关" hidden>
    <span class="crt-led"></span> CRT
  </button>
  <div id="edit-controls" class="edit-controls" hidden>
    <button id="edit-toggle" class="pill-btn" type="button" aria-pressed="false" title="编辑图说 / 描述">✎ 编辑</button>
    <button id="edit-export" class="pill-btn" type="button" title="导出已编辑的文案 JSON" hidden>导出</button>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
